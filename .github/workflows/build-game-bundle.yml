name: Build game bundle

on:
  push:
    paths:
      - 'dev/package.json'
      - 'dev/scripts/bundle-browser-game.mjs'
      - 'static/game/src/**'
      - 'static/game.bundle.js'
      - 'ui/public.html'
      - '.github/workflows/build-game-bundle.yml'
  pull_request:
    paths:
      - 'dev/package.json'
      - 'dev/scripts/bundle-browser-game.mjs'
      - 'static/game/src/**'
      - 'static/game.bundle.js'
      - 'ui/public.html'
      - '.github/workflows/build-game-bundle.yml'

jobs:
  build-game-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build browser game bundle
        run: npm --prefix dev run build:game

      - name: Check committed bundle is current
        run: git diff --exit-code -- static/game.bundle.js
